version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# UAM Scorecard Platform – Docker Compose
#
# Services:
#   db       – PostgreSQL 16  (data persisted in pgdata volume)
#   redis    – Redis 7        (session cache)
#   api      – FastAPI        (Python 3.12, port 8000)
#   frontend – Angular + Nginx (port 80)
#
# Quick start:
#   docker compose up -d
#   Open http://localhost
#   Login: admin@uam.local / admin123
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-uam_scorecard}
      POSTGRES_USER:     ${POSTGRES_USER:-uam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uam_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uam} -d ${POSTGRES_DB:-uam_scorecard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Switch to PostgreSQL in production:
      DATABASE_URL:  postgresql+asyncpg://${POSTGRES_USER:-uam}:${POSTGRES_PASSWORD:-uam_secret_2024}@db:5432/${POSTGRES_DB:-uam_scorecard}
      SECRET_KEY:    ${SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      REDIS_URL:     redis://redis:6379
      UPLOAD_DIR:    /app/uploads
      DEBUG:         ${DEBUG:-false}
      CORS_ORIGINS:  '["http://localhost", "http://localhost:4200"]'
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Angular Frontend (Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
