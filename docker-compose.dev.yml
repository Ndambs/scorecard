version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Development overrides – hot reload for both frontend and backend
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ─────────────────────────────────────────────────────────────────────────────

services:

  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./uam_scorecard.db   # SQLite for local dev (no DB container needed)
      DEBUG: "true"
    volumes:
      - ./backend:/app                                        # mount source for hot reload
    # Override healthcheck to be more lenient during dev
    healthcheck:
      start_period: 5s

  frontend:
    # Skip the production build image; use the Angular dev server instead
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci --silent && npm start -- --host 0.0.0.0 --poll 1000"
    volumes:
      - ./frontend:/app
      - /app/node_modules                                     # anonymous volume for node_modules
    ports:
      - "4200:4200"
    environment:
      - NODE_ENV=development
